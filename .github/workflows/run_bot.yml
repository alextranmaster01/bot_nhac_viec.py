name: Auto Run Telegram Bot

on:
  schedule:
    # Chạy lúc 9h00 sáng giờ VN (Tức 2:00 sáng giờ UTC)
    - cron: '0 2 * * *'
    # Chạy lúc 16h30 chiều giờ VN (Tức 9:30 sáng giờ UTC)
    - cron: '30 9 * * *'
  # Cho phép hiện nút bấm chạy thử bằng tay
  workflow_dispatch:

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy code từ kho về
        uses: actions/checkout@v4

      - name: Cài đặt môi trường Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt các thư viện cần thiết
        run: |
          pip install requests supabase pandas

      - name: KÍCH HOẠT BOT NHẮC VIỆC 🚀
        run: python bot_nhac_viec.py
